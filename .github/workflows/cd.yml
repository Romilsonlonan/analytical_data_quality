name: CD

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Run dbt tests
        run: |
          cd dbt
          cp profiles.yml profiles.yml
          dbt deps
          dbt debug
          dbt test

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Deploy to production
        run: |
          cd dbt
          cp profiles.yml profiles.yml
          dbt deps
          dbt run --target prod
        env:
          POSTGRES_LAKEHOUSE_HOST: ${{ secrets.POSTGRES_LAKEHOUSE_HOST }}
          POSTGRES_LAKEHOUSE_PORT: ${{ secrets.POSTGRES_LAKEHOUSE_PORT }}
          POSTGRES_USER: ${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_LAKEHOUSE_DB: ${{ secrets.POSTGRES_LAKEHOUSE_DB }}
