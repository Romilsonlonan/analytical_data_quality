name: Data Quality

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install great-expectations pandas psycopg2-binary

      - name: Run Great Expectations
        run: |
          great_expectations checkpoint run bronze_quality || true
          great_expectations checkpoint run silver_quality || true

      - name: Report results
        run: |
          echo "Data quality check completed"
          echo "Check results in Great Expectations Data Docs"