name: dbt Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'dbt/**'
      - 'dbt_project.yml'

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Install poetry
        run: pipx install poetry

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12.9'
          cache: 'poetry'

      - name: Install dependencies
        run: |
          poetry install --no-interaction --no-root

      - name: Clean dbt packages
        run: |
          rm -rf dbt/dbt_packages dbt/package-lock.yml

      - name: Run dbt tests
        run: |
          cd dbt
          cp profiles.yml profiles.yml
          poetry run dbt deps
          poetry run dbt debug
          poetry run dbt run
          poetry run dbt test


