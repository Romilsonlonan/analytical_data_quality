name: dbt Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    paths:
      - 'dbt/**'
      - 'dbt_project.yml'

jobs:
  dbt-test:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -e .

      - name: Run dbt tests
        run: |
          cd dbt
          cp profiles.yml profiles.yml
          dbt deps
          dbt debug
          dbt test
          dbt run
