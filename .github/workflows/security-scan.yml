name: Security Scan

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install safety
        run: pip install safety bandit

      - name: Run safety check
        run: safety check --requirements=pyproject.toml || true

      - name: Run bandit
        run: bandit -r src/ -f json -o bandit-report.json || true

      - name: Check secrets
        run: |
          pip install git-secrets || true
          echo "Configure git-secrets in repository settings"