version: 2

sources:
  - name: raw
    description: "Dados brutos provenientes dos sistemas fontes"
    database: warehouse
    schema: staging
    loader: python_script
    loaded_at_field: created_at
    freshness:
      warn_after: {count: 1, period: hour}
      error_after: {count: 24, period: hour}
    tables:
      - name: orders
        description: "Pedidos do sistema de e-commerce/logística"
        identifier: orders_staging
        columns:
          - name: order_id
            description: "Identificador único do pedido"
            tests:
              - unique
              - not_null
          - name: customer_id
            description: "Identificador do cliente"
            tests:
              - not_null
          - name: order_date
            description: "Data de criação do pedido"
            tests:
              - not_null
          - name: status
            description: "Status do pedido"
            tests:
              - not_null
          - name: total_amount
            description: "Valor total do pedido"
            tests:
              - not_null
          - name: delivery_address
            description: "Endereço de entrega"
          - name: created_at
            description: "Data de criação do registro"
            tests:
              - not_null
          - name: updated_at
            description: "Data de atualização do registro"

      - name: deliveries
        description: "Entregas realizadas"
        identifier: deliveries_staging
        columns:
          - name: delivery_id
            description: "Identificador único da entrega"
            tests:
              - unique
              - not_null
          - name: order_id
            description: "Identificador do pedido"
            tests:
              - not_null
          - name: carrier_id
            description: "Identificador da transportadora"
          - name: driver_id
            description: "Identificador do motorista"
          - name: delivery_date
            description: "Data de entrega"
          - name: status
            description: "Status da entrega"
            tests:
              - not_null
          - name: created_at
            tests:
              - not_null
          - name: updated_at

      - name: inventory
        description: "Inventário de produtos"
        identifier: inventory_staging
        columns:
          - name: sku
            description: "SKU do produto"
            tests:
              - unique
              - not_null
          - name: product_name
            description: "Nome do produto"
          - name: category
            description: "Categoria do produto"
          - name: quantity_on_hand
            description: "Quantidade em estoque"
            tests:
              - not_null
          - name: warehouse_id
            description: "Identificador do armazém"
          - name: last_restock_date
            description: "Data do último replenishment"
          - name: created_at
            tests:
              - not_null
          - name: updated_at

      - name: customers
        description: "Dados dos clientes"
        identifier: customers_staging
        columns:
          - name: customer_id
            description: "Identificador único do cliente"
            tests:
              - unique
              - not_null
          - name: customer_name
            description: "Nome do cliente"
          - name: email
            description: "E-mail do cliente"
          - name: phone
            description: "Telefone do cliente"
          - name: segment
            description: "Segmento do cliente"
          - name: created_at
            tests:
              - not_null
          - name: updated_at

      - name: carriers
        description: "Transportadoras parceiras"
        identifier: carriers_staging
        columns:
          - name: carrier_id
            description: "Identificador da transportadora"
            tests:
              - unique
              - not_null
          - name: carrier_name
            description: "Nome da transportadora"
          - name: contact_email
            description: "E-mail de contato"
          - name: service_type
            description: "Tipo de serviço"
          - name: created_at
            tests:
              - not_null
          - name: updated_at

      - name: warehouses
        description: "Armazéns da operação"
        identifier: warehouses_staging
        columns:
          - name: warehouse_id
            description: "Identificador do armazém"
            tests:
              - unique
              - not_null
          - name: warehouse_name
            description: "Nome do armazém"
          - name: location
            description: "Localização"
          - name: capacity
            description: "Capacidade total"
          - name: created_at
            tests:
              - not_null
          - name: updated_at

  - name: bronze
    description: "Dados da camada Bronze - Dados brutos do setor de vendas"
    database: warehouse
    schema: bronze
    loader: python_script
    loaded_at_field: loaded_at
    freshness:
      warn_after: {count: 1, period: hour}
      error_after: {count: 24, period: hour}
    tables:
      - name: quali_vendas
        description: "Dados qualitativos de vendas do Google Sheets"
        identifier: bronze_quali_vendas
        columns:
          - name: data_venda
            description: "Data da venda"
          - name: vendedor_id
            description: "Identificador do vendedor"
          - name: etapa_funil
            description: "Etapa do funil de vendas"
          - name: tipo_atividade
            description: "Tipo de atividade realizada"
          - name: data_inicio
            description: "Data e hora de início"
          - name: data_fim
            description: "Data e hora de fim"
          - name: inicio_hora
            description: "Hora de início"
          - name: fim_hora
            description: "Hora de fim"
          - name: duracao_min
            description: "Duração em minutos"
          - name: cliente_id
            description: "Identificador do cliente"
          - name: resultado
            description: "Resultado da atividade"
          - name: valor_venda
            description: "Valor da venda"
          - name: loaded_at
            description: "Data de carregamento"