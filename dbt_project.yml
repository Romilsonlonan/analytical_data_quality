name: industrial_logistics_platform
version: 1.0.0
profile: ilp_dev

model-paths: ["dbt/models"]
analysis-paths: ["dbt/analyses"]
test-paths: ["dbt/tests"]
seed-paths: ["dbt/seeds"]
macro-paths: ["dbt/macros"]
snapshot-paths: ["dbt/snapshots"]
target-path: "dbt/target"
clean-targets:
  - "dbt/target"
  - "dbt/dbt_packages"
log-path: "dbt/logs"
packages-install-path: "dbt/dbt_packages"

config-version: 2

vars:
  environment: dev
  data_quality_enabled: true

models:
  industrial_logistics_platform:
    staging:
      +schema: staging
      +materialized: view
    trusted:
      +schema: trusted
      +materialized: table
    refined:
      +schema: refined
      +materialized: table

on-run-start:
  - "SET search_path TO {{ target.schema }}"

quoting:
  identifier: true
  schema: false
  database: false

tests:
  +store_failures: true